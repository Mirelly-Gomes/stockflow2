
<section id="page-pedidos" class="page">
  <div class="page-header">
    <h1>Pedidos</h1>
    <p>Registro e acompanhamento de pedidos</p>
  </div>
  <div class="card">
    <div class="toolbar">
      <div class="search-box">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
        <input placeholder="Buscar por cliente..." oninput="Controllers.pedidos.q=this.value;Controllers.pedidos.render()">
      </div>
      <select class="btn btn-outline" style="padding:9px 14px;font-size:.88rem;" onchange="Controllers.pedidos.filterStatus=this.value;Controllers.pedidos.render()">
        <option value="">Todos os status</option>
        <option value="Em aberto">Em aberto</option>
        <option value="Quitado">Quitado</option>
      </select>
      <button class="btn btn-primary" onclick="Controllers.pedidos.new()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" d="M12 5v14M5 12h14"/></svg>
        Novo Pedido
      </button>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>#</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Lucro</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>
  </div>
</section>
